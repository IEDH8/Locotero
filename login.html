<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e1e1e;
padding:30px;
border-radius:10px;
text-align:center;
width:300px;
}

input{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#6c5ce7;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>Login / تسجيل الدخول</h2>

<input type="text" placeholder="Username / اسم المستخدم">

<input type="password" placeholder="Password / كلمة المرور">

<button>Login</button>

</div>

</body>
</html>
