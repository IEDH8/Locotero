<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#1b1b1b;
height:100vh;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin:8px 0;
background:#2a2a2a;
border-radius:6px;
}

.sidebar a:hover{
background:#6c5ce7;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

/* BUTTON */

button{
padding:8px 15px;
border:none;
background:#6c5ce7;
color:white;
border-radius:5px;
cursor:pointer;
margin-left:10px;
}

/* CARDS */

.cards{
display:flex;
gap:20px;
}

.card{
background:#1e1e1e;
padding:30px;
border-radius:10px;
width:220px;
text-align:center;
font-size:20px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2 id="panelTitle">Admin Panel</h2>

<a id="navDashboard" href="#">Dashboard</a>
<a id="navUsers" href="#">Users</a>
<a id="navAdmins" href="#">Admins</a>
<a id="navSettings" href="#">Settings</a>
<a id="navLogout" href="/login.html">Logout</a>

</div>

<div class="main">

<div class="topbar">

<h1 id="title">Dashboard</h1>

<div>
<button onclick="setLang('ar')">Arabic</button>
<button onclick="setLang('en')">English</button>
</div>

</div>

<div class="cards">

<div class="card">
<h2>120</h2>
<p id="usersText">Users</p>
</div>

<div class="card">
<h2>5</h2>
<p id="adminsText">Admins</p>
</div>

<div class="card">
<h2>32</h2>
<p id="activeText">Active</p>
</div>

</div>

</div>

<script>

function setLang(lang){

if(lang === "ar"){

document.documentElement.lang = "ar"
document.body.style.direction = "rtl"

document.getElementById("title").innerText = "لوحة التحكم"
document.getElementById("panelTitle").innerText = "لوحة الإدارة"

document.getElementById("navDashboard").innerText = "الرئيسية"
document.getElementById("navUsers").innerText = "المستخدمين"
document.getElementById("navAdmins").innerText = "الأدمن"
document.getElementById("navSettings").innerText = "الإعدادات"
document.getElementById("navLogout").innerText = "تسجيل الخروج"

document.getElementById("usersText").innerText = "المستخدمين"
document.getElementById("adminsText").innerText = "الأدمن"
document.getElementById("activeText").innerText = "النشطين"

}

if(lang === "en"){

document.documentElement.lang = "en"
document.body.style.direction = "ltr"

document.getElementById("title").innerText = "Dashboard"
document.getElementById("panelTitle").innerText = "Admin Panel"

document.getElementById("navDashboard").innerText = "Dashboard"
document.getElementById("navUsers").innerText = "Users"
document.getElementById("navAdmins").innerText = "Admins"
document.getElementById("navSettings").innerText = "Settings"
document.getElementById("navLogout").innerText = "Logout"

document.getElementById("usersText").innerText = "Users"
document.getElementById("adminsText").innerText = "Admins"
document.getElementById("activeText").innerText = "Active"

}

}

</script>

</body>
</html>
