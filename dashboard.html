<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
}

.sidebar{
width:220px;
background:#1b1b1b;
height:100vh;
padding:20px;
}

.sidebar h2{
text-align:center;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin:10px 0;
background:#2a2a2a;
border-radius:5px;
}

.sidebar a:hover{
background:#6c5ce7;
}

.main{
flex:1;
padding:30px;
}

.cards{
display:flex;
gap:20px;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:30px;
}

button{
padding:8px 15px;
border:none;
background:#6c5ce7;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Admin Panel</h2>

<a href="#">Dashboard</a>
<a href="#">Users</a>
<a href="#">Admins</a>
<a href="#">Settings</a>
<a href="/login.html">Logout</a>

</div>

<div class="main">

<div class="topbar">

<h1>Dashboard</h1>

<div>
<button>Arabic</button>
<button>English</button>
</div>

</div>

<div class="cards">

<div class="card">
<h2>120</h2>
<p>Users</p>
</div>

<div class="card">
<h2>5</h2>
<p>Admins</p>
</div>

<div class="card">
<h2>32</h2>
<p>Active</p>
</div>

</div>

</div>

</body>
</html>
