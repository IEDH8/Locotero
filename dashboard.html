<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
}

.sidebar{
width:220px;
background:#1b1b1b;
height:100vh;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin:8px 0;
background:#2a2a2a;
border-radius:6px;
}

.sidebar a:hover{
background:#6c5ce7;
}

.main{
flex:1;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:40px;
}

.cards{
display:flex;
gap:20px;
}

.card{
background:#1e1e1e;
padding:30px;
border-radius:10px;
width:200px;
text-align:center;
font-size:20px;
}

button{
padding:8px 15px;
border:none;
background:#6c5ce7;
color:white;
border-radius:5px;
cursor:pointer;
margin-left:10px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2 id="panelTitle">Admin Panel</h2>

<a href="dashboard.html">Dashboard</a>
<a href="users.html">Users</a>
<a href="admins.html">Admins</a>
<a href="settings.html">Settings</a>
<a href="index.html">Logout</a>

</div>

<div class="main">

<div class="topbar">

<h1 id="title">Dashboard</h1>

<div>
<button onclick="setLang('ar')">Arabic</button>
<button onclick="setLang('en')">English</button>
</div>

</div>

<div class="cards">

<div class="card">
<h2>120</h2>
<p id="t1">Users</p>
</div>

<div class="card">
<h2>5</h2>
<p id="t2">Admins</p>
</div>

<div class="card">
<h2>32</h2>
<p id="t3">Active</p>
</div>

</div>

</div>

<script>

function setLang(lang){

if(lang==="ar"){

document.body.style.direction="rtl"
document.getElementById("title").innerText="لوحة التحكم"
document.getElementById("panelTitle").innerText="لوحة الإدارة"
document.getElementById("t1").innerText="المستخدمين"
document.getElementById("t2").innerText="الأدمن"
document.getElementById("t3").innerText="النشطين"

}

if(lang==="en"){

document.body.style.direction="ltr"
document.getElementById("title").innerText="Dashboard"
document.getElementById("panelTitle").innerText="Admin Panel"
document.getElementById("t1").innerText="Users"
document.getElementById("t2").innerText="Admins"
document.getElementById("t3").innerText="Active"

}

}

</script>

</body>
</html>
