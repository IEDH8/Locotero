<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Locotero</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#181818;
}

.logo{
font-size:24px;
font-weight:bold;
color:#9b5cff;
}

.lang select{
background:#222;
color:white;
border:none;
padding:6px;
border-radius:5px;
}

.container{
padding:40px;
max-width:900px;
margin:auto;
}

.card{
background:#1c1c1c;
padding:25px;
border-radius:10px;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#2a2a2a;
color:white;
}

button{
margin-top:15px;
padding:10px 20px;
background:#9b5cff;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">Locotero</div>

<div class="lang">
<select onchange="changeLang(this.value)">
<option value="ar">العربية</option>
<option value="en">English</option>
<option value="fr">Français</option>
<option value="es">Español</option>
<option value="de">Deutsch</option>
<option value="ru">Русский</option>
<option value="zh">中文</option>
<option value="ja">日本語</option>
</select>
</div>
</div>

<div class="container">

<div class="card">
<h1 id="title">منصة Locotero للروايات</h1>
<p id="desc">أفضل مكان لقراءة الروايات والقصص</p>
</div>

<div class="card">

<h2 id="login">تسجيل الدخول</h2>

<input placeholder="Username">
<input type="password" placeholder="Password">

<button onclick="location.href='dashboard.html'">Login</button>

</div>

</div>

<script src="lang.js"></script>

</body>
</html>
