<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1e1e1e;
padding:40px;
border-radius:10px;
text-align:center;
width:300px;
}

input{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#6c5ce7;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>Login / تسجيل الدخول</h2>

<input id="username" type="text" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user==="owner" && pass==="123"){
localStorage.setItem("role","owner")
window.location="dashboard.html"
}

else if(user==="admin" && pass==="123"){
localStorage.setItem("role","admin")
window.location="dashboard.html"
}

else{
alert("Wrong login")
}

}

</script>

</body>
